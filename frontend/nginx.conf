server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # index.html must never be cached (contains hashed JS/CSS refs)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
  }

  # Hashed assets can be cached forever
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Backend API
  location /api/         { proxy_pass http://backend:8000; }
  location /health       { proxy_pass http://backend:8000; }
  location /ready        { proxy_pass http://backend:8000; }
  location /docs         { proxy_pass http://backend:8000; }
  location /redoc        { proxy_pass http://backend:8000; }
  location /openapi.json { proxy_pass http://backend:8000; }

  # ─────────────────────────────────────────────────────────────────────
  # Sprint 3.3 — Plugin iframe reverse-proxy
  # Some service plugins (n8n) set X-Frame-Options: sameorigin, which
  # blocks direct iframing from the hubex frontend. We proxy them here
  # under the same origin as the hubex frontend and strip the blocking
  # header + downgrade any CSP frame-ancestors directive. This keeps
  # docker.sock exposure at zero (n8n container is unchanged), works
  # for any hostname the user browses from, and avoids cross-port/CORS.
  # ─────────────────────────────────────────────────────────────────────
  location /plugins-embed/n8n/ {
    proxy_pass http://hubex-n8n:5678/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket support for n8n live editor connections
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 86400;
    # Kill any response headers that would block same-origin iframing.
    # n8n's helmet middleware sets all of these; they must be stripped
    # so the browser allows the iframe to load.
    proxy_hide_header X-Frame-Options;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Content-Security-Policy-Report-Only;
    proxy_hide_header Cross-Origin-Opener-Policy;
    proxy_hide_header Cross-Origin-Resource-Policy;
    proxy_hide_header Cross-Origin-Embedder-Policy;
  }

  # SPA fallback — must be last because /plugins-embed/ etc. would
  # otherwise be swallowed by the catch-all try_files
  location / { try_files $uri $uri/ /index.html; }
}
